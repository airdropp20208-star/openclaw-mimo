name: Phantom Node v4.0

on:
  workflow_dispatch:

env:
  DS_EMAIL: ${{ secrets.DS_EMAIL }}
  DS_PASSWORD: ${{ secrets.DS_PASSWORD }}
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  god-mode:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup
        id: setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          
          function Log($msg, $color = "White") {
              $ts = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
              Write-Host "[$ts] $msg" -ForegroundColor $color
          }
          
          Log "=== PHANTOM NODE v4.0 ===" Magenta
          
          # RDP
          Log "Enable RDP..." Cyan
          iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))
          
          # SSH
          Log "Enable SSH..." Cyan
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 2>$null
          Start-Service sshd
          Set-Service -Name sshd -StartupType Automatic
          $sshd = "$env:ProgramData\ssh\sshd_config"
          (Get-Content $sshd) -replace '#PasswordAuthentication yes', 'PasswordAuthentication yes' | Set-Content $sshd
          Restart-Service sshd
          
          # Cloudflared tunnel
          Log "Cloudflared tunnel..." Cyan
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "C:\cloudflared.exe"
          Start-Process -FilePath "C:\cloudflared.exe" -ArgumentList "tunnel --url ssh://localhost:22" -NoNewWindow -RedirectStandardOutput "C:\tunnel.log" -RedirectStandardError "C:\tunnel-err.log"
          Start-Sleep -Seconds 15
          
          $tunnelLog = Get-Content "C:\tunnel-err.log" -ErrorAction SilentlyContinue | Select-String "https://.*trycloudflare.com"
          if ($tunnelLog) { Log "TUNNEL: $($tunnelLog.Matches[0].Value)" Green }
          
          # Node 18
          Log "Node 18..." Cyan
          $ErrorActionPreference = "SilentlyContinue"
          Install-Product node 18 | Out-Null
          $ErrorActionPreference = "Continue"
          node --version | ForEach-Object { Log "Node: $_" Green }
          
          # ds2api
          Log "ds2api..." Yellow
          $dir = "C:\ds2api"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          Invoke-WebRequest -Uri "https://github.com/CJackHwang/ds2api/releases/latest/download/ds2api-windows-amd64.zip" -OutFile "C:\ds2api.zip"
          Expand-Archive -Path "C:\ds2api.zip" -DestinationPath $dir -Force
          $exe = (Get-ChildItem -Path $dir -Filter "ds2api.exe" -Recurse | Select-Object -First 1).FullName
          Log "ds2api: $exe" Green
          
          @{
              keys = @($env:API_KEY)
              accounts = @(@{ email = $env:DS_EMAIL; password = $env:DS_PASSWORD })
              model_aliases = @{
                  "gpt-4o" = "deepseek-v4-pro"
                  "gpt-4o-mini" = "deepseek-v4-flash"
                  "claude-sonnet-4-20250514" = "deepseek-v4-pro"
                  "gemini-2.5-pro" = "deepseek-v4-pro"
              }
          } | ConvertTo-Json -Depth 5 | Set-Content -Path "$dir\config.json" -Encoding UTF8
          
          Start-Process -FilePath $exe -WorkingDirectory $dir -WindowStyle Hidden
          Start-Sleep -Seconds 5
          
          # DeepSeek-TUI
          Log "DeepSeek-TUI..." Cyan
          $ErrorActionPreference = "SilentlyContinue"
          npm install -g deepseek-tui 2>$null | Out-Null
          $ErrorActionPreference = "Continue"
          
          Log "=== ALL READY ===" Green
          echo "ds2api_path=$exe" >> $env:GITHUB_OUTPUT
          echo "ds2api_dir=$dir" >> $env:GITHUB_OUTPUT

      - name: Monitor (6h)
        shell: pwsh
        run: |
          $ds2apiPath = "${{ steps.setup.outputs.ds2api_path }}"
          $ds2apiDir = "${{ steps.setup.outputs.ds2api_dir }}"
          
          Write-Host "=== MONITORING ===" -ForegroundColor Green
          Write-Host "ds2api: $ds2apiPath" -ForegroundColor Cyan
          
          $wsh = New-Object -ComObject WScript.Shell
          
          for ($i = 1; $i -le 360; $i++) {
              $wsh.SendKeys('{F15}')
              
              $d = if (Get-Process ds2api -EA SilentlyContinue) { "OK" } else { "DOWN" }
              $ram = [math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory / 1024, 1)
              
              Write-Host "[$i/360] RAM:${ram}MB | ds2api:$d" -ForegroundColor Cyan
              
              if ($d -eq "DOWN") {
                  Write-Host "[!] Restarting ds2api" -ForegroundColor Red
                  Start-Process -FilePath $ds2apiPath -WorkingDirectory $ds2apiDir -WindowStyle Hidden
              }
              
              Start-Sleep -Seconds 60
          }
