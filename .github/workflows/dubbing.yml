name: Donghua Dubbing Agent

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video URL (YouTube/Bilibili/etc)'
        required: true
        type: string
      source_lang:
        description: 'Source language'
        required: false
        type: choice
        default: 'Chinese'
        options:
          - Chinese
          - Japanese
          - Korean
      target_lang:
        description: 'Target language'
        required: false
        type: choice
        default: 'Vietnamese'
        options:
          - Vietnamese
          - English
      tts_engine:
        description: 'TTS engine (omnivoice=voice cloning via API, edge=free cloud TTS)'
        required: false
        type: choice
        default: 'omnivoice'
        options:
          - omnivoice
          - edge
      voice_instruct:
        description: 'Voice design prompt (for omnivoice)'
        required: false
        type: string
        default: 'female, vietnamese accent, natural'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install -q yt-dlp edge-tts faster-whisper pydub numpy pillow requests
      - name: Test imports
        run: |
          python -c "from engines.dubbing_engine import run_pipeline, DubConfig; print('Engine OK')"
          python -c "import yt_dlp, edge_tts, faster_whisper; print('Deps OK')"

  dub:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install -q yt-dlp edge-tts faster-whisper pydub numpy pillow requests
      - name: Run dubbing
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          SOURCE_LANG: ${{ github.event.inputs.source_lang }}
          TARGET_LANG: ${{ github.event.inputs.target_lang }}
          TTS_ENGINE: ${{ github.event.inputs.tts_engine }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_API_BASE: ${{ secrets.MIMO_API_BASE || 'https://api.xiaomimimo.com/v1' }}
          MIMO_MODEL: ${{ secrets.MIMO_MODEL || 'mimo-v2.5-pro' }}
          OMNIVOICE_API_URL: ${{ secrets.OMNIVOICE_API_URL }}
          OMNIVOICE_API_KEY: ${{ secrets.OMNIVOICE_API_KEY }}
        run: |
          python3 engines/dubbing_engine.py \
            --url "$VIDEO_URL" \
            --source-lang "$SOURCE_LANG" \
            --target-lang "$TARGET_LANG" \
            --tts-engine "$TTS_ENGINE" \
            --omnivoice-url "$OMNIVOICE_API_URL" \
            --omnivoice-key "$OMNIVOICE_API_KEY" \
            --mimo-key "$MIMO_API_KEY" \
            --output /tmp/output
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dubbed-video
          path: /tmp/output/
          retention-days: 7
