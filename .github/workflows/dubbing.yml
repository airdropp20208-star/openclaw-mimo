name: OpenClaw Dubbing Agent

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video URL to dub'
        required: true
        type: string
      mimo_api_key:
        description: 'MiMo API Key'
        required: true
        type: string
      omnivoice_url:
        description: 'OmniVoice API URL'
        required: true
        type: string
      source_lang:
        description: 'Source language'
        required: false
        type: choice
        default: 'Chinese'
        options:
          - Chinese
          - Japanese
          - Korean
      target_lang:
        description: 'Target language'
        required: false
        type: choice
        default: 'Vietnamese'
        options:
          - Vietnamese
          - English
      voice:
        description: 'Voice instruct'
        required: false
        type: string
        default: 'female, vietnamese accent, natural'

permissions:
  contents: write

jobs:
  dub:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install -q yt-dlp faster-whisper pydub numpy pillow requests python-telegram-bot
      - name: Run dubbing
        env:
          MIMO_API_KEY: ${{ github.event.inputs.mimo_api_key }}
          OMNIVOICE_API_URL: ${{ github.event.inputs.omnivoice_url }}
        run: |
          python3 agent.py --url "${{ github.event.inputs.video_url }}" \
            --source-lang "${{ github.event.inputs.source_lang }}" \
            --target-lang "${{ github.event.inputs.target_lang }}" \
            --voice "${{ github.event.inputs.voice }}"
      - name: Upload result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dubbed-output
          path: /tmp/dub_output/
          retention-days: 7
