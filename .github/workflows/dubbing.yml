name: OpenClaw Dubbing Agent

on:
  workflow_dispatch:
    inputs:
      mimo_api_key:
        description: 'MiMo API Key'
        required: true
        type: string
      omnivoice_url:
        description: 'OmniVoice API URL'
        required: true
        type: string
      source_lang:
        description: 'Source language'
        required: false
        type: choice
        default: 'Chinese'
        options:
          - Chinese
          - Japanese
          - Korean
      target_lang:
        description: 'Target language'
        required: false
        type: choice
        default: 'Vietnamese'
        options:
          - Vietnamese
          - English
      voice:
        description: 'Voice instruct'
        required: false
        type: string
        default: 'female, vietnamese accent, natural'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install -q yt-dlp faster-whisper pydub numpy pillow requests python-telegram-bot
      - name: Test imports
        run: |
          python -c "from engines.dubbing_engine import run_pipeline, DubConfig; print('Engine OK')"
          python -c "from agent import DubbingAgent; print('Agent OK')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy info
        run: |
          echo "🚀 Agent ready to deploy!"
          echo ""
          echo "Run on server:"
          echo "  BOT_TOKEN=\$BOT_TOKEN \\"
          echo "  MIMO_API_KEY=${{ github.event.inputs.mimo_api_key }} \\"
          echo "  OMNIVOICE_API_URL=${{ github.event.inputs.omnivoice_url }} \\"
          echo "  ALLOWED_CHATS=\$ALLOWED_CHATS \\"
          echo "  python3 telegram_agent.py"
