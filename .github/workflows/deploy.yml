name: Deploy Phantom Node
on:
  workflow_dispatch:
    inputs:
      deepseek_email:
        description: "DeepSeek Email"
        required: false
        default: ""
      deepseek_password:
        description: "DeepSeek Password"
        required: false
        default: ""
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ds2api
        run: |
          curl -L -o ds2api.tar.gz "https://github.com/CJackHwang/ds2api/releases/download/v4.6.1/ds2api_v4.6.1_linux_amd64.tar.gz"
          tar -xzf ds2api.tar.gz && mv ds2api_v4.6.1_linux_amd64 ds2api
          chmod +x ds2api/ds2api && rm ds2api.tar.gz
          echo "ds2api OK"

      - name: Install Open Interpreter
        run: pip install open-interpreter && echo "open-interpreter OK"

      - name: Configure ds2api
        env:
          DS_EMAIL: ${{ github.event.inputs.deepseek_email }}
          DS_PASSWORD: ${{ github.event.inputs.deepseek_password }}
        run: |
          EMAIL="${DS_EMAIL:-tooltdshaha00001@gmail.com}"
          PASS="${DS_PASSWORD:-son22tq2011}"
          printf '{"keys":["sk-phantom"],"accounts":[{"email":"%s","password":"%s"}],"model_aliases":{"gpt-4o":"deepseek-v4-pro-nothinking","gpt-4o-mini":"deepseek-v4-flash"},"runtime":{"account_max_inflight":2,"token_refresh_interval_hours":6}}\n' "$EMAIL" "$PASS" > ds2api/config.json
          echo "ds2api configured"

      - name: Start ds2api
        run: |
          cd ds2api && nohup ./ds2api > ../ds2api.log 2>&1 & echo $! > ../ds2api.pid && cd ..
          sleep 5
          curl -s http://localhost:5001/healthz > /dev/null && echo "ds2api running" || echo "ds2api starting..."

      - name: Test DeepSeek V4
        run: |
          python3 -c "
          import urllib.request, json
          payload = json.dumps({'model':'deepseek-v4-pro-nothinking','messages':[{'role':'user','content':'Say hello'}],'max_tokens':50}).encode()
          req = urllib.request.Request('http://localhost:5001/v1/chat/completions', data=payload, headers={'Content-Type':'application/json','Authorization':'Bearer sk-phantom'})
          with urllib.request.urlopen(req, timeout=30) as r:
              d = json.loads(r.read())
              print('DeepSeek V4 OK:', d['choices'][0]['message']['content'][:100])
          "

      - name: Start Telegram Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DS2API_URL: "http://localhost:5001/v1"
        run: |
          nohup python3 telegram-bot.py > bot.log 2>&1 & echo $! > bot.pid
          sleep 3
          kill -0 $(cat bot.pid) 2>/dev/null && echo "bot running" || (echo "bot failed:" && cat bot.log)

      - name: Setup SSH
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          sudo apt-get update -qq && sudo apt-get install -y -qq openssh-server
          sudo systemctl start ssh
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "runner:phantom123" | sudo chpasswd
          sudo systemctl restart ssh
          cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
          echo $! > tunnel.pid
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[^ ]*trycloudflare\.com' tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "SSH: ssh runner@$TUNNEL_URL (pass: phantom123)"
            echo "SSH: ssh runner@$TUNNEL_URL" > CONNECTION.md
            echo "Password: phantom123" >> CONNECTION.md
            git config user.email "bot@phantom-node" && git config user.name "Bot"
            git add CONNECTION.md && git commit -m "chore: connection [skip ci]" || true && git push
          fi

      - name: Verify
        run: |
          echo "=== Status ==="
          curl -s http://localhost:5001/healthz > /dev/null && echo "ds2api: OK" || echo "ds2api: FAIL"
          kill -0 $(cat bot.pid 2>/dev/null) 2>/dev/null && echo "bot: OK" || echo "bot: FAIL"
          echo "Flow: Telegram → Bot → ds2api(:5001) → DeepSeek V4 (FREE)"

      - name: Keep Alive
        run: |
          while true; do
            TS=$(date '+%Y-%m-%d %H:%M:%S')
            curl -s http://localhost:5001/healthz > /dev/null 2>&1 || {
              echo "[$TS] ds2api down, restarting..."
              cd ds2api && nohup ./ds2api > ../ds2api.log 2>&1 & echo $! > ../ds2api.pid && cd ..
            }
            kill -0 $(cat bot.pid 2>/dev/null) 2>/dev/null || {
              echo "[$TS] bot down, restarting..."
              export BOT_TOKEN="${{ secrets.BOT_TOKEN }}"
              export DS2API_URL="http://localhost:5001/v1"
              nohup python3 telegram-bot.py > bot.log 2>&1 & echo $! > bot.pid
            }
            kill -0 $(cat tunnel.pid 2>/dev/null) 2>/dev/null || {
              echo "[$TS] tunnel down, restarting..."
              nohup cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 & echo $! > tunnel.pid
            }
            sleep 300
          done
