name: Deploy Phantom Node

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: "Xiaomi Mimo API Key"
        required: false
        default: ""

permissions:
  contents: write

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hermes
        run: |
          pip install --upgrade pip
          pip install hermes-agent
          hermes --version

      - name: Configure Hermes
        env:
          API_KEY: ${{ github.event.inputs.api_key }}
        run: |
          # Resolve API key
          if [ -n "$API_KEY" ]; then
            XM_KEY="$API_KEY"
          elif [ -n "$XIAOMI_API_KEY" ]; then
            XM_KEY="$XIAOMI_API_KEY"
          else
            XM_KEY="YOUR_KEY_HERE"
          fi

          # Create config directory
          mkdir -p ~/.hermes

          # Write .env
          cat > ~/.hermes/.env << EOF
          XIAOMI_API_KEY=$XM_KEY
          GATEWAY_ALLOW_ALL_USERS=true
          EOF

          # Write config.yaml
          cat > ~/.hermes/config.yaml << EOF
          model:
            default: mimo-v2.5
            provider: xiaomi
            base_url: https://api.xiaomimimo.com/v1
          providers: {}
          fallback_providers: []
          toolsets:
            - hermes-cli
          agent:
            max_turns: 90
            gateway_timeout: 1800
            api_max_retries: 3
            tool_use_enforcement: auto
            disabled_toolsets: []
          terminal:
            backend: local
            timeout: 300
            persistent_shell: true
          display:
            personality: kawaii
            language: vi
          security:
            allow_private_urls: true
            redact_secrets: true
            allow_lazy_installs: true
          memory:
            memory_enabled: true
            user_profile_enabled: true
          context:
            engine: compressor
          compression:
            enabled: true
          telegram:
            bot_token: $TELEGRAM_BOT_TOKEN
            allowed_chats: '*'
            reactions: false
            channel_prompts: {}
          platform_toolsets:
            cli:
              - browser
              - clarify
              - code_execution
              - cronjob
              - delegation
              - file
              - image_gen
              - memory
              - session_search
              - skills
              - terminal
              - todo
              - tts
              - vision
              - web
          _config_version: 23
          EOF

          echo "Config created"
          cat ~/.hermes/config.yaml | grep -A 5 "telegram:"

      - name: Start Gateway
        run: |
          # Start Hermes gateway in background
          nohup hermes gateway > ~/.hermes/gateway.log 2>&1 &
          echo $! > ~/.hermes/gateway.pid
          
          # Wait for startup
          sleep 10
          
          # Check if running
          if kill -0 $(cat ~/.hermes/gateway.pid) 2>/dev/null; then
            echo "Gateway started successfully"
            tail -20 ~/.hermes/gateway.log
          else
            echo "Gateway failed to start"
            cat ~/.hermes/gateway.log
            exit 1
          fi

      - name: Setup SSH Tunnel
        run: |
          # Install cloudflared
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          
          # Install openssh-server
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server
          sudo systemctl start ssh
          
          # Configure SSH
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          
          # Set password for runner user
          echo "runner:phantom123" | sudo chpasswd
          
          # Start tunnel
          cloudflared tunnel --url ssh://localhost:22 > ~/.hermes/tunnel.log 2>&1 &
          echo $! > ~/.hermes/tunnel.pid
          
          # Wait for tunnel URL
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' ~/.hermes/tunnel.log | head -1)
          
          if [ -n "$TUNNEL_URL" ]; then
            echo "TUNNEL_URL=$TUNNEL_URL" >> ~/.hermes/.env
            echo "SSH: ssh runner@$TUNNEL_URL"
            echo "Password: phantom123"
            
            # Update CONNECTION.md
            cat > CONNECTION.md << EOF
            # Connection Info
            
            ## SSH Access
            \`\`\`
            ssh runner@$TUNNEL_URL
            Password: phantom123
            \`\`\`
            
            ## Telegram Bot
            Control via your Telegram bot
            
            ## Status
            - Gateway: Running
            - Tunnel: Active
            - API: Xiaomi Mimo 2.5
            EOF
            
            # Commit connection info
            git config user.email "bot@phantom-node"
            git config user.name "Phantom Bot"
            git add CONNECTION.md
            git commit -m "chore: update connection info [skip ci]" || true
            git push
          else
            echo "Tunnel URL not found yet"
            cat ~/.hermes/tunnel.log
          fi

      - name: Keep Alive
        run: |
          echo "Phantom Node is running!"
          echo "Gateway PID: $(cat ~/.hermes/gateway.pid)"
          echo "Tunnel PID: $(cat ~/.hermes/tunnel.pid)"
          echo ""
          echo "To stop: kill $(cat ~/.hermes/gateway.pid)"
          echo ""
          
          # Keep alive loop - heartbeat every 5 minutes
          while true; do
            # Check gateway
            if ! kill -0 $(cat ~/.hermes/gateway.pid) 2>/dev/null; then
              echo "[$(date)] Gateway died, restarting..."
              nohup hermes gateway > ~/.hermes/gateway.log 2>&1 &
              echo $! > ~/.hermes/gateway.pid
            fi
            
            # Check tunnel
            if ! kill -0 $(cat ~/.hermes/tunnel.pid) 2>/dev/null; then
              echo "[$(date)] Tunnel died, restarting..."
              nohup cloudflared tunnel --url ssh://localhost:22 > ~/.hermes/tunnel.log 2>&1 &
              echo $! > ~/.hermes/tunnel.pid
            fi
            
            echo "[$(date)] Heartbeat - OK"
            sleep 300
          done
