name: Deploy Phantom Node
on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'Xiaomi MiMo API Key'
        required: true
        type: string
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb scrot imagemagick poppler-utils ffmpeg curl jq

      - name: Install Python packages
        run: |
          pip install requests markitdown python-pptx openpyxl python-docx pymupdf

      - name: Save env to file
        run: |
          cat > /tmp/bot.env << ENVEOF
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          API_KEY=${{ github.event.inputs.api_key }}
          API_BASE=https://api.xiaomimimo.com/v1
          MODEL=mimo-v2.5
          ALLOWED_CHATS=${{ secrets.ALLOWED_CHATS }}
          ENVEOF

      - name: Start Telegram Bot
        run: |
          set -a
          source /tmp/bot.env
          set +a
          nohup python3 telegram-bot.py > bot.log 2>&1 &
          echo $! > bot.pid
          sleep 3
          kill -0 $(cat bot.pid) 2>/dev/null && echo "bot OK" || (echo "bot FAIL" && cat bot.log)

      - name: Setup SSH via ngrok
        run: |
          # Install ngrok
          curl -s https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | sudo tar -xz -C /usr/local/bin
          # Auth
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          # Setup SSH
          sudo apt-get install -y -qq openssh-server
          sudo systemctl start ssh
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "runner:phantom123" | sudo chpasswd
          sudo systemctl restart ssh
          # Start ngrok TCP tunnel
          nohup ngrok tcp 22 --log=stdout > ngrok.log 2>&1 &
          echo $! > ngrok.pid
          sleep 5
          # Get public URL
          TUNNEL_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' 2>/dev/null)
          if [ -n "$TUNNEL_URL" ] && [ "$TUNNEL_URL" != "null" ]; then
            NGROK_HOST=$(echo "$TUNNEL_URL" | sed 's|tcp://||')
            echo "SSH: ssh runner@$NGROK_HOST (pass: phantom123)" > CONNECTION.md
            echo "Password: phantom123" >> CONNECTION.md
            git config user.email "bot@phantom-node" && git config user.name "Bot"
            git add CONNECTION.md && git commit -m "chore: connection [skip ci]" || true && git push
            echo "✅ SSH ready: $NGROK_HOST"
          else
            echo "❌ ngrok tunnel failed"
            cat ngrok.log | tail -20
          fi

      - name: Verify
        run: |
          echo "=== Bot ==="
          kill -0 $(cat bot.pid 2>/dev/null) 2>/dev/null && echo "bot: OK" || echo "bot: FAIL"
          echo "=== Log ==="
          cat bot.log 2>/dev/null || echo "(empty)"

      - name: Keep Alive
        run: |
          while true; do
            TS=$(date '+%Y-%m-%d %H:%M:%S')
            kill -0 $(cat bot.pid 2>/dev/null) 2>/dev/null || {
              echo "[$TS] bot down, restarting..."
              set -a
              source /tmp/bot.env
              set +a
              nohup python3 telegram-bot.py > bot.log 2>&1 &
              echo $! > bot.pid
            }
            kill -0 $(cat ngrok.pid 2>/dev/null) 2>/dev/null || {
              echo "[$TS] ngrok down, restarting..."
              nohup ngrok tcp 22 --log=stdout > ngrok.log 2>&1 &
              echo $! > ngrok.pid
            }
            sleep 300
          done
