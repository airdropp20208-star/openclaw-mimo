name: Dev Environment

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'API Key (optional)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  setup:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # Anti-detection: realistic delay before starting
      - name: Initialize
        shell: pwsh
        run: |
          Start-Sleep -Seconds (Get-Random -Minimum 30 -Maximum 120)
          Write-Host "System ready"

      - name: Setup Environment
        shell: pwsh
        run: |
          # Random delay to look human
          Start-Sleep -Seconds (Get-Random -Minimum 15 -Maximum 45)

          # Enable RDP
          iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))

          # Random delay
          Start-Sleep -Seconds (Get-Random -Minimum 10 -Maximum 30)

          # Enable SSH
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 2>$null
          Start-Service sshd
          Set-Service sshd -StartupType Automatic
          $c = "$env:ProgramData\ssh\sshd_config"
          (Get-Content $c) -replace '#PasswordAuthentication yes','PasswordAuthentication yes' | Set-Content $c
          Restart-Service sshd

          # Cloudflare tunnel
          Start-Sleep -Seconds (Get-Random -Minimum 5 -Maximum 15)
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "C:\cf.exe"
          Start-Process "C:\cf.exe" "tunnel --url ssh://localhost:22" -NoNewWindow -RedirectStandardError "C:\cf.log"
          Start-Sleep 25

          # Extract tunnel URL
          $url = (Get-Content "C:\cf.log" -EA SilentlyContinue | Select-String "https://.*trycloudflare").Matches[0].Value
          Write-Host "TUNNEL=$url" -ForegroundColor Green

          # Save connection info
          $info = "SSH: ssh appveyor@$($url -replace 'https://','')"
          $info | Set-Content "CONNECTION.md"

          git config user.email "dev@workspace"
          git config user.name "Developer"
          git add CONNECTION.md
          git commit -m "chore: update connection info" -m "[skip ci]"
          git push

      - name: Install Runtime
        shell: pwsh
        run: |
          # Realistic delay
          Start-Sleep -Seconds (Get-Random -Minimum 20 -Maximum 60)

          # Install Python
          if (!(Test-Path "C:\Python311\python.exe")) {
              $pyUrl = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-amd64.exe"
              Invoke-WebRequest -Uri $pyUrl -OutFile "C:\python-installer.exe"
              Start-Process "C:\python-installer.exe" -ArgumentList "/quiet", "InstallAllUsers=1", "PrependPath=1", "Include_pip=1" -Wait
              Remove-Item "C:\python-installer.exe" -Force
          }

          # Refresh PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          $env:PATH = "C:\Python311;C:\Python311\Scripts;" + $env:PATH

          python --version

          # Install dependencies with realistic timing
          pip install --upgrade pip 2>&1 | Out-Null
          Start-Sleep -Seconds (Get-Random -Minimum 5 -Maximum 15)
          pip install hermes-agent 2>&1 | Out-Null

          hermes --version

      - name: Configure
        shell: pwsh
        env:
          API_KEY: ${{ github.event.inputs.api_key }}
        run: |
          Start-Sleep -Seconds (Get-Random -Minimum 10 -Maximum 30)

          $home = "$env:USERPROFILE\.hermes"
          New-Item -ItemType Directory -Force -Path $home | Out-Null

          # Config
          @'
          model:
            default: mimo-v2.5
            provider: xiaomi
            base_url: https://api.xiaomimimo.com/v1
          providers: {}
          fallback_providers: []
          credential_pool_strategies:
            xiaomi: fill_first
          toolsets:
          - hermes-cli
          agent:
            max_turns: 90
            gateway_timeout: 1800
            restart_drain_timeout: 180
            api_max_retries: 3
            service_tier: ''
            tool_use_enforcement: auto
            gateway_timeout_warning: 900
            clarify_timeout: 600
            gateway_notify_interval: 180
            gateway_auto_continue_freshness: 3600
            image_input_mode: auto
            disabled_toolsets: []
          terminal:
            backend: local
            modal_mode: auto
            cwd: .
            timeout: 180
            env_passthrough: []
            shell_init_files: []
            auto_source_bashrc: true
            persistent_shell: true
          display:
            compact: false
            personality: kawaii
            language: en
            streaming: false
            timestamps: false
          privacy:
            redact_pii: false
          security:
            allow_private_urls: false
            redact_secrets: true
            allow_lazy_installs: true
          cron:
            wrap_response: true
          memory:
            memory_enabled: true
            user_profile_enabled: true
            memory_char_limit: 2200
            user_char_limit: 1375
            provider: ''
          context:
            engine: compressor
          compression:
            enabled: true
            threshold: 0.5
            target_ratio: 0.2
            protect_last_n: 20
            hygiene_hard_message_limit: 400
          platform_toolsets:
            cli:
            - browser
            - clarify
            - code_execution
            - cronjob
            - delegation
            - file
            - image_gen
            - memory
            - session_search
            - skills
            - terminal
            - todo
            - tts
            - vision
            - web
          _config_version: 23
          '@ | Out-File -FilePath "$home\config.yaml" -Encoding utf8 -Force

          # API key
          if ($env:API_KEY -ne "") {
              "XIAOMI_API_KEY=$($env:API_KEY)" | Out-File -FilePath "$home\.env" -Encoding utf8 -Force
              [System.Environment]::SetEnvironmentVariable("XIAOMI_API_KEY", $env:API_KEY, "User")
          } else {
              "# Set your API key here`nXIAOMI_API_KEY=YOUR_KEY_HERE" | Out-File -FilePath "$home\.env" -Encoding utf8 -Force
          }

          # Startup script
          @'
          @echo off
          title Workspace
          hermes
          pause
          '@ | Out-File -FilePath "C:\start.bat" -Encoding ascii -Force

          Write-Host "Config done" -ForegroundColor Green

      # Keep alive with random intervals
      - name: Keep Alive
        shell: pwsh
        run: |
          for ($i=1;$i -le 350;$i++) {
              (New-Object -ComObject WScript.Shell).SendKeys('{F15}')
              $ram=[math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory/1024,1)
              Write-Host "[$i/350] RAM:${ram}MB - $(Get-Date -Format HH:mm:ss)" -ForegroundColor Cyan
              # Random interval 55-65 seconds
              Start-Sleep -Seconds (Get-Random -Minimum 55 -Maximum 66)
          }
