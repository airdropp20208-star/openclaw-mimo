name: Deploy Phantom Node
on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'Xiaomi MiMo API Key'
        required: true
        type: string
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb scrot imagemagick poppler-utils ffmpeg curl jq

      - name: Install hermes-agent
        run: |
          pip install hermes-agent
          hermes --version

      - name: Install OpenManus
        run: |
          git clone --depth 1 https://github.com/FoundationAgents/OpenManus.git /tmp/OpenManus
          cd /tmp/OpenManus
          pip install -r requirements.txt
          playwright install chromium --with-deps
          echo "OpenManus installed OK"

      - name: Setup OpenManus config
        run: |
          mkdir -p /tmp/OpenManus/config
          cat > /tmp/OpenManus/config/config.toml << 'TOML'
          [llm]
          model = "mimo-v2.5"
          base_url = "https://api.xiaomimimo.com/v1"
          max_tokens = 4096
          temperature = 0.0

          [browser]
          headless = true
          disable_security = true
          extra_chromium_args = ["--no-sandbox", "--disable-dev-shm-usage"]

          [search]
          engine = "DuckDuckGo"
          TOML
          # Inject API key into config
          sed -i "s|^          max_tokens|max_tokens|" /tmp/OpenManus/config/config.toml
          sed -i '/^\[llm\]/,/^\[/{s|^          |  |}' /tmp/OpenManus/config/config.toml
          sed -i '/^\[browser\]/,/^\[/{s|^          |  |}' /tmp/OpenManus/config/config.toml
          sed -i '/^\[search\]/,/^\[/{s|^          |  |}' /tmp/OpenManus/config/config.toml
          sed -i 's/^          //' /tmp/OpenManus/config/config.toml

      - name: Setup Hermes config
        run: |
          mkdir -p ~/.hermes
          cat > ~/.hermes/config.yaml << 'YAML'
          model:
            default: "mimo-v2.5"
            provider: "xiaomi"
            base_url: "https://api.xiaomimimo.com/v1"
          agent:
            max_turns: 90
            gateway_timeout: 1800
          terminal:
            backend: local
            timeout: 180
          toolsets:
          - hermes-cli
          YAML
          # Fix indentation
          sed -i 's/^          //' ~/.hermes/config.yaml

      - name: Start Bot
        env:
          XIAOMI_API_KEY: ${{ github.event.inputs.api_key }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS: ${{ secrets.ALLOWED_CHATS }}
          HERMES_INFERENCE_PROVIDER: xiaomi
        run: |
          pkill -f "hermes gateway" 2>/dev/null || true
          sleep 1
          nohup hermes gateway run > bot.log 2>&1 &
          echo $! > bot.pid
          sleep 5
          kill -0 $(cat bot.pid) 2>/dev/null && echo "bot OK" || (echo "bot FAIL" && cat bot.log | tail -30)

      - name: Setup SSH
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          sudo apt-get install -y -qq openssh-server
          sudo systemctl start ssh
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "runner:phantom123" | sudo chpasswd
          sudo systemctl restart ssh
          cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
          echo $! > tunnel.pid
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[^ ]*trycloudflare\.com' tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            SSH_HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
            echo "SSH: ssh runner@$SSH_HOST (pass: phantom123)" > CONNECTION.md
            echo "Password: phantom123" >> CONNECTION.md
            git config user.email "bot@phantom-node" && git config user.name "Bot"
            git add CONNECTION.md && git commit -m "chore: connection [skip ci]" || true && git push
          fi

      - name: Verify
        run: |
          echo "=== Bot ==="
          kill -0 $(cat bot.pid 2>/dev/null) 2>/dev/null && echo "bot: OK" || echo "bot: FAIL"
          echo "=== Log ==="
          tail -20 bot.log 2>/dev/null || echo "(empty)"
          echo "=== OpenManus ==="
          ls /tmp/OpenManus/main.py && echo "OpenManus: OK" || echo "OpenManus: MISSING"

      - name: Keep Alive
        run: |
          while true; do
            TS=$(date '+%Y-%m-%d %H:%M:%S')
            if ! kill -0 $(cat bot.pid 2>/dev/null) 2>/dev/null; then
              echo "[$TS] bot down, restarting..."
              pkill -f "hermes gateway" 2>/dev/null || true
              sleep 2
              nohup hermes gateway run > bot.log 2>&1 &
              echo $! > bot.pid
              echo "[$TS] bot restarted, pid=$(cat bot.pid)"
            fi
            if ! kill -0 $(cat tunnel.pid 2>/dev/null) 2>/dev/null; then
              echo "[$TS] tunnel down, restarting..."
              nohup cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
              echo $! > tunnel.pid
            fi
            sleep 300
          done
