name: Deploy Hermes Agent
on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'Xiaomi MiMo API Key'
        required: true
        type: string
      api_keys:
        description: 'Additional API Keys (comma-separated)'
        required: false
        type: string
      api_base:
        description: 'API Base URL'
        required: false
        type: string
        default: 'https://api.xiaomimimo.com/v1'
      model:
        description: 'Model name'
        required: false
        type: string
        default: 'mimo-v2.5'
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg imagemagick poppler-utils

      - name: Install Python deps
        run: pip install -q -r requirements.txt

      - name: Kill old processes
        run: |
          pkill -f "python bot.py" 2>/dev/null || true
          sleep 1

      - name: Start Bot
        env:
          API_KEY: ${{ github.event.inputs.api_key }}
          API_KEYS: ${{ github.event.inputs.api_keys }}
          API_BASE: ${{ github.event.inputs.api_base }}
          MODEL: ${{ github.event.inputs.model }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ALLOWED_CHATS: ${{ secrets.ALLOWED_CHATS }}
        run: |
          nohup python bot.py > bot.log 2>&1 &
          echo $! > bot.pid
          sleep 5
          if kill -0 $(cat bot.pid) 2>/dev/null; then
            echo "✅ Bot started (PID: $(cat bot.pid))"
          else
            echo "❌ Bot failed to start:"
            tail -30 bot.log
            exit 1
          fi

      - name: Verify
        run: |
          echo "=== Process ==="
          kill -0 $(cat bot.pid 2>/dev/null) 2>/dev/null && echo "bot: OK" || echo "bot: FAIL"
          echo "=== Imports ==="
          python -c "from agent import HermesAgent; print('agent: OK')"
          python -c "from tools import TOOLS; print(f'tools: {len(TOOLS)} loaded')"
          echo "=== Log ==="
          tail -10 bot.log 2>/dev/null || echo "(empty)"

      - name: Keep Alive
        run: |
          while true; do
            if ! kill -0 $(cat bot.pid 2>/dev/null) 2>/dev/null; then
              echo "[$(date)] Bot down, restarting..."
              pkill -f "python bot.py" 2>/dev/null || true
              sleep 2
              nohup python bot.py > bot.log 2>&1 &
              echo $! > bot.pid
              echo "[$(date)] Restarted (PID: $(cat bot.pid))"
            fi
            sleep 300
          done
