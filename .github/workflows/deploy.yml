name: Deploy Phantom Node
on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'Xiaomi MiMo API Key'
        required: true
        type: string
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb scrot imagemagick poppler-utils ffmpeg curl jq

      - name: Install Python packages
        run: |
          pip install requests markitdown python-pptx openpyxl python-docx pymupdf

      - name: Save env
        run: |
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > /tmp/bot.env
          echo "API_KEYS=${{ github.event.inputs.api_key }}" >> /tmp/bot.env
          echo "API_BASE=https://api.xiaomimimo.com/v1" >> /tmp/bot.env
          echo "MODEL=mimo-v2.5" >> /tmp/bot.env
          echo "ALLOWED_CHATS=${{ secrets.ALLOWED_CHATS }}" >> /tmp/bot.env
          echo "env saved:"
          grep -v TOKEN /tmp/bot.env

      - name: Start Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          API_KEYS: ${{ github.event.inputs.api_key }}
          API_BASE: "https://api.xiaomimimo.com/v1"
          MODEL: "mimo-v2.5"
          ALLOWED_CHATS: ${{ secrets.ALLOWED_CHATS }}
        run: |
          pkill -f telegram-bot.py 2>/dev/null || true
          sleep 1
          nohup python3 telegram-bot.py > bot.log 2>&1 &
          echo $! > bot.pid
          sleep 3
          kill -0 $(cat bot.pid) 2>/dev/null && echo "bot OK" || (echo "bot FAIL" && cat bot.log)

      - name: Setup SSH
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          sudo apt-get install -y -qq openssh-server
          sudo systemctl start ssh
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "runner:phantom123" | sudo chpasswd
          sudo systemctl restart ssh
          cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
          echo $! > tunnel.pid
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[^ ]*trycloudflare\.com' tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            SSH_HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
            echo "SSH: ssh runner@$SSH_HOST (pass: phantom123)" > CONNECTION.md
            echo "Password: phantom123" >> CONNECTION.md
            git config user.email "bot@phantom-node" && git config user.name "Bot"
            git add CONNECTION.md && git commit -m "chore: connection [skip ci]" || true && git push
          fi

      - name: Verify
        run: |
          echo "=== Bot ==="
          kill -0 $(cat bot.pid 2>/dev/null) 2>/dev/null && echo "bot: OK" || echo "bot: FAIL"
          echo "=== Log ==="
          tail -10 bot.log 2>/dev/null || echo "(empty)"

      - name: Keep Alive
        run: |
          while true; do
            TS=$(date '+%Y-%m-%d %H:%M:%S')
            # Kill ALL old bot instances first, then start one clean
            if ! kill -0 $(cat bot.pid 2>/dev/null) 2>/dev/null; then
              echo "[$TS] bot down, restarting..."
              pkill -f telegram-bot.py 2>/dev/null || true
              sleep 2
              export $(cat /tmp/bot.env | grep -v '^#' | xargs)
              nohup python3 telegram-bot.py > bot.log 2>&1 &
              echo $! > bot.pid
              echo "[$TS] bot restarted, pid=$(cat bot.pid)"
            fi
            if ! kill -0 $(cat tunnel.pid 2>/dev/null) 2>/dev/null; then
              echo "[$TS] tunnel down, restarting..."
              nohup cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
              echo $! > tunnel.pid
            fi
            sleep 300
          done
