name: Deploy

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: Mimo API Key
        required: false
        default: ""

permissions:
  contents: write

jobs:
  setup:
    runs-on: windows-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        shell: pwsh
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          $env:PATH = "C:\Python311;C:\Python311\Scripts;C:\nodejs;C:\nodejs\node_modules\.bin;" + $env:PATH

          Write-Host "=== RDP ===" -ForegroundColor Cyan
          iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))

          Write-Host "=== SSH ===" -ForegroundColor Cyan
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 2>$null
          Start-Service sshd
          Set-Service sshd -StartupType Automatic
          $sc = "$env:ProgramData\ssh\sshd_config"
          (Get-Content $sc) -replace '#PasswordAuthentication yes','PasswordAuthentication yes' | Set-Content $sc
          Restart-Service sshd

          Write-Host "=== Tunnel ===" -ForegroundColor Cyan
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "C:\cf.exe"
          Start-Process "C:\cf.exe" "tunnel --url ssh://localhost:22" -NoNewWindow -RedirectStandardError "C:\cf.log"
          Start-Sleep 25
          $url = (Get-Content "C:\cf.log" -EA SilentlyContinue | Select-String "https://.*trycloudflare").Matches[0].Value
          Write-Host "TUNNEL=$url" -ForegroundColor Green

          $sshCmd = "ssh appveyor@" + ($url -replace 'https://','')
          Set-Content -Path "CONNECTION.md" -Value "SSH: $sshCmd"
          git config user.email "dev@workspace"
          git config user.name "Developer"
          git add CONNECTION.md
          git commit -m "chore: connection" -m "[skip ci]"
          git push

          Write-Host "=== Python ===" -ForegroundColor Cyan
          if (!(Test-Path "C:\Python311\python.exe")) {
              Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.11.9/python-3.11.9-amd64.exe" -OutFile "C:\py.exe"
              Start-Process "C:\py.exe" -ArgumentList "/quiet InstallAllUsers=1 PrependPath=1 Include_pip=1" -Wait
              Remove-Item "C:\py.exe" -Force
          }
          python --version

          Write-Host "=== Node ===" -ForegroundColor Cyan
          if (!(Test-Path "C:\nodejs\node.exe")) {
              Invoke-WebRequest -Uri "https://nodejs.org/dist/v20.11.1/node-v20.11.1-x64.msi" -OutFile "C:\node.msi"
              Start-Process "msiexec.exe" -ArgumentList "/i C:\node.msi /quiet INSTALLDIR=C:\nodejs" -Wait
              Remove-Item "C:\node.msi" -Force
          }
          node --version

          Write-Host "=== Git ===" -ForegroundColor Cyan
          if (!(Test-Path "C:\Program Files\Git\cmd\git.exe")) {
              Invoke-WebRequest -Uri "https://github.com/git-for-windows/git/releases/download/v2.44.0.windows.1/Git-2.44.0-64-bit.exe" -OutFile "C:\git.exe"
              Start-Process "C:\git.exe" -ArgumentList "/VERYSILENT /NORESTART" -Wait
              Remove-Item "C:\git.exe" -Force
          }
          git --version

          Write-Host "=== Install ===" -ForegroundColor Cyan
          pip install --upgrade pip 2>&1 | Out-Null
          pip install hermes-agent 2>&1 | Out-Null
          hermes --version

          Write-Host "=== Done ===" -ForegroundColor Green

      - name: Config
        shell: pwsh
        env:
          API_KEY: ${{ github.event.inputs.api_key }}
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          $env:PATH = "C:\Python311;C:\Python311\Scripts;" + $env:PATH

          $h = "$env:USERPROFILE\.hermes"
          New-Item -ItemType Directory -Force -Path $h | Out-Null

          $cfg = "model:`n"
          $cfg += "  default: mimo-v2.5`n"
          $cfg += "  provider: xiaomi`n"
          $cfg += "  base_url: https://api.xiaomimimo.com/v1`n"
          $cfg += "providers: {}`n"
          $cfg += "fallback_providers: []`n"
          $cfg += "credential_pool_strategies:`n"
          $cfg += "  xiaomi: fill_first`n"
          $cfg += "toolsets:`n"
          $cfg += "- hermes-cli`n"
          $cfg += "agent:`n"
          $cfg += "  max_turns: 90`n"
          $cfg += "  gateway_timeout: 1800`n"
          $cfg += "  api_max_retries: 3`n"
          $cfg += "  tool_use_enforcement: auto`n"
          $cfg += "  disabled_toolsets: []`n"
          $cfg += "terminal:`n"
          $cfg += "  backend: local`n"
          $cfg += "  timeout: 300`n"
          $cfg += "  persistent_shell: true`n"
          $cfg += "display:`n"
          $cfg += "  personality: kawaii`n"
          $cfg += "  language: en`n"
          $cfg += "security:`n"
          $cfg += "  allow_private_urls: true`n"
          $cfg += "  redact_secrets: true`n"
          $cfg += "  allow_lazy_installs: true`n"
          $cfg += "memory:`n"
          $cfg += "  memory_enabled: true`n"
          $cfg += "  user_profile_enabled: true`n"
          $cfg += "context:`n"
          $cfg += "  engine: compressor`n"
          $cfg += "compression:`n"
          $cfg += "  enabled: true`n"
          $cfg += "telegram:`n"
          $cfg += "  bot_token: 8965017390:AAF0nDHAnADjyiTTfhbmPWi2wCdbV7YFxtQ`n"
          $cfg += "  allowed_chats: '7563947218'`n"
          $cfg += "  reactions: false`n"
          $cfg += "  channel_prompts: {}`n"
          $cfg += "platform_toolsets:`n"
          $cfg += "  cli:`n"
          $cfg += "  - browser`n"
          $cfg += "  - clarify`n"
          $cfg += "  - code_execution`n"
          $cfg += "  - cronjob`n"
          $cfg += "  - delegation`n"
          $cfg += "  - file`n"
          $cfg += "  - image_gen`n"
          $cfg += "  - memory`n"
          $cfg += "  - session_search`n"
          $cfg += "  - skills`n"
          $cfg += "  - terminal`n"
          $cfg += "  - todo`n"
          $cfg += "  - tts`n"
          $cfg += "  - vision`n"
          $cfg += "  - web`n"
          $cfg += "_config_version: 23`n"
          Set-Content -Path "$h\config.yaml" -Value $cfg -Encoding utf8

          if ($env:API_KEY -ne "") {
              Set-Content -Path "$h\.env" -Value "XIAOMI_API_KEY=$($env:API_KEY)" -Encoding utf8
          } else {
              Set-Content -Path "$h\.env" -Value "XIAOMI_API_KEY=YOUR_KEY_HERE" -Encoding utf8
          }

          $bat1 = '@echo off' + "`r`n"
          $bat1 += 'title Phantom Node' + "`r`n"
          $bat1 += 'echo Starting Hermes Gateway...' + "`r`n"
          $bat1 += 'hermes gateway' + "`r`n"
          $bat1 += 'pause' + "`r`n"
          Set-Content -Path "C:\start.bat" -Value $bat1 -Encoding ascii

          $bat2 = '@echo off' + "`r`n"
          $bat2 += 'title Phantom Node CLI' + "`r`n"
          $bat2 += 'hermes' + "`r`n"
          $bat2 += 'pause' + "`r`n"
          Set-Content -Path "C:\cli.bat" -Value $bat2 -Encoding ascii

          Write-Host "Config OK" -ForegroundColor Green

      - name: Keep Alive
        shell: pwsh
        run: |
          for ($i=1;$i -le 320;$i++) {
              (New-Object -ComObject WScript.Shell).SendKeys('{F15}')
              $ram=[math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory/1024,1)
              Write-Host "[$i/320] RAM:${ram}MB"
              Start-Sleep 60
          }
