# ==============================================================================
#   PHANTOM NODE - GOD MODE v2.0 [STABLE UPGRADE]
#   Architecture: DeepSeek V4 (Flash/Pro/NoThinking) + 9Router + ds2api
#   Features: Self-Healing, Dynamic RAM Cleansing, CPU Priority, Health Checks
#   Changelog v2.0:
#     - Fixed: 9router path broken (newline in $env:APPDATA)
#     - Fixed: RAM calculation (was dividing by 1024 twice)
#     - Added: Download retry logic (3 attempts)
#     - Added: Health check before starting services sequentially
#     - Added: ds2api port verification before 9router launch
#     - Added: Session download validation
#     - Added: File logging to desktop
#     - Added: Dynamic model mapping (5 models instead of 3)
#     - Added: Graceful shutdown with process tree kill
#     - Added: Network connectivity check before IDE launch
# ==============================================================================

version: 999.0.{build}
image: Visual Studio 2022
build: off

shallow_clone: true
clone_depth: 1
branches:
  only:
    - main

environment:
  GITHUB_TOKEN: "YOUR_GITHUB_TOKEN_HERE"
  # ==========================================================================
  # [QUAN TRỌNG] ĐIỀN THÔNG TIN CỦA BẠN VÀO 2 DÒNG DƯỚI:
  # ==========================================================================
  DEEPSEEK_TOKEN: "sk-mykey"
  SESSION_DOWNLOAD_URL: ""

init:
  - ps: iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))

install:
  - ps: |
      $ErrorActionPreference = "Stop"
      $logFile = "$env:USERPROFILE\Desktop\phantom-node.log"
      function Log($msg, $color = "White") {
          $ts = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          $line = "[$ts] $msg"
          Write-Host $line -ForegroundColor $color
          Add-Content -Path $logFile -Value $line -ErrorAction SilentlyContinue
      }
      function Download-WithRetry($url, $out, $retries = 3) {
          for ($i = 1; $i -le $retries; $i++) {
              try {
                  Log "Download attempt $i/$retries : $url" Cyan
                  Invoke-WebRequest -Uri $url -OutFile $out -TimeoutSec 120
                  if ((Get-Item $out).Length -gt 0) { return $true }
              } catch {
                  Log "Download failed: $($_.Exception.Message)" Red
                  if ($i -lt $retries) { Start-Sleep -Seconds 5 }
              }
          }
          return $false
      }

      Log "========================================" Magenta
      Log " PHANTOM NODE v2.0 - GOD MODE SEQUENCE " Magenta
      Log "========================================" Magenta

      # 1. EXTREME DEBLOAT - GIẾT DỊCH VỤ RÁC
      Log "[1/7] Đang chiếm quyền kiểm soát OS..." Cyan
      try { Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue } catch { }
      $servicesToKill = @("wsearch", "DiagTrack", "SysMain", "WerSvc", "Spooler", "BITS", "wuauserv", "DoSvc", "Schedule", "WdiServiceHost")
      foreach ($svc in $servicesToKill) {
          Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
          Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
      }
      Log "  Killed $($servicesToKill.Count) services" Green

      # 2. CÀI NODE 18 + CHROME
      Log "[2/7] Đang cài Node 18 + Chrome..." Cyan
      $ErrorActionPreference = "SilentlyContinue"
      Install-Product node 18 | Out-Null
      $ErrorActionPreference = "Stop"
      node --version | ForEach-Object { Log "  Node: $_" Green }

      $chromePath = "$env:TEMP\chrome_installer.exe"
      if (!(Test-Path "$env:ProgramFiles\Google\Chrome\Application\chrome.exe")) {
          if (Download-WithRetry "https://dl.google.com/chrome/install/latest/chrome_installer.exe" $chromePath) {
              Start-Process $chromePath -ArgumentList "/silent /install" -Wait
              Log "  Chrome installed" Green
          } else { Log "  Chrome install failed, continuing..." Yellow }
      } else { Log "  Chrome already installed" Green }

      # 3. BƠM SESSION
      Log "[3/7] Khôi phục ký ức Agent (Session Injection)..." Cyan
      $configDir = "$env:USERPROFILE\.antigravity"
      if (!(Test-Path $configDir)) { New-Item -ItemType Directory -Path $configDir -Force | Out-Null }
      $sessionZip = "$env:TEMP\session.zip"
      $driveUrl = $env:SESSION_DOWNLOAD_URL
      if ($driveUrl -and $driveUrl -ne "YOUR_SESSION_URL_HERE") {
          if ($driveUrl -notmatch "&confirm=t") { $driveUrl += "&confirm=t" }
          if (Download-WithRetry $driveUrl $sessionZip) {
              try {
                  Expand-Archive -Path $sessionZip -DestinationPath $configDir -Force
                  Log "  Session injected OK" Green
              } catch { Log "  Session extract failed: $($_.Exception.Message)" Red }
          } else { Log "  Session download failed!" Red }
      } else { Log "  No session URL provided, skipping" Yellow }

      # 4. KHỞI TẠO ds2api
      Log "[4/7] Khởi tạo Lõi API DeepSeek (ds2api)..." Yellow
      $ds2apiDir = "C:\ds2api"
      New-Item -ItemType Directory -Path $ds2apiDir -Force | Out-Null
      if (Download-WithRetry "https://github.com/liuran001/ds2api/releases/latest/download/ds2api-windows-amd64.zip" "C:\ds2api.zip") {
          Expand-Archive -Path "C:\ds2api.zip" -DestinationPath $ds2apiDir -Force
          $ds2apiExe = (Get-ChildItem -Path $ds2apiDir -Filter "ds2api.exe" -Recurse | Select-Object -First 1).FullName
          $env:DS2API_PATH = $ds2apiExe
          $ds2apiWorkDir = Split-Path $ds2apiExe
          $env:DS2API_DIR = $ds2apiWorkDir

          $ds2apiConfig = @{
              port = 5001
              api_key = "local-key"
              accounts = @( @{ token = $env:DEEPSEEK_TOKEN; platform = "deepseek" } )
          } | ConvertTo-Json -Depth 5
          Set-Content -Path "$ds2apiWorkDir\config.json" -Value $ds2apiConfig -Encoding UTF8
          Start-Process -FilePath $ds2apiExe -WorkingDirectory $ds2apiWorkDir -WindowStyle Hidden

          # Chờ ds2api khởi động
          $ds2apiReady = $false
          for ($w = 1; $w -le 10; $w++) {
              Start-Sleep -Seconds 2
              try {
                  $resp = Invoke-WebRequest -Uri "http://127.0.0.1:5001/v1/models" -TimeoutSec 3 -ErrorAction Stop
                  if ($resp.StatusCode -eq 200) { $ds2apiReady = $true; break }
              } catch { }
          }
          if ($ds2apiReady) { Log "  ds2api ready on :5001" Green }
          else { Log "  ds2api may not be ready, continuing anyway..." Yellow }
      } else { Log "  ds2api download FAILED!" Red }

      # 5. KHỞI TẠO 9ROUTER (FIXED: path was broken)
      Log "[5/7] Dệt lưới định tuyến MITM 9router..." Yellow
      npm install -g 9router 2>$null | Out-Null
      $9rConfigDir = "$env:USERPROFILE\.9router"
      if (!(Test-Path $9rConfigDir)) { New-Item -ItemType Directory -Path $9rConfigDir -Force | Out-Null }

      $providers = @{
          "ds2api-local" = @{
              id = "ds2api-local"
              name = "DeepSeek V4 VIP"
              type = "openai"
              baseUrl = "http://127.0.0.1:5001/v1"
              apiKey = "local-key"
              models = @(
                  "deepseek-v4-flash",
                  "deepseek-v4-pro",
                  "deepseek-v4-flash-nothinking",
                  "deepseek-v4-lite",
                  "deepseek-chat"
              )
              enabled = $true
          }
      } | ConvertTo-Json -Depth 5
      Set-Content -Path "$9rConfigDir\providers.json" -Value $providers -Encoding UTF8

      $settings = @{
          mitm = @{ enabled = $true; port = 9090 }
          mappings = @(
              @{ from = "gemini-3.1-pro-high"; to = "ds2api-local/deepseek-v4-pro" }
              @{ from = "gemini-3.1-pro-low"; to = "ds2api-local/deepseek-v4-flash" }
              @{ from = "gemini-3-flash"; to = "ds2api-local/deepseek-v4-flash-nothinking" }
              @{ from = "gpt-4o"; to = "ds2api-local/deepseek-v4-pro" }
              @{ from = "gpt-4o-mini"; to = "ds2api-local/deepseek-v4-flash" }
              @{ from = "claude-sonnet-4-20250514"; to = "ds2api-local/deepseek-v4-pro" }
              @{ from = "claude-3-5-haiku"; to = "ds2api-local/deepseek-v4-flash" }
          )
      } | ConvertTo-Json -Depth 5
      Set-Content -Path "$9rConfigDir\settings.json" -Value $settings -Encoding UTF8

      # FIXED: Broken path - was "$env:APPDATA\npm\9router.cmd"
      $npmGlobalPrefix = (npm config get prefix 2>$null).Trim()
      $9routerCmd = Join-Path $npmGlobalPrefix "9router.cmd"
      $env:ROUTER_PATH = $9routerCmd
      Log "  9router path: $9routerCmd" Cyan
      Start-Process -FilePath $9routerCmd -ArgumentList "start", "--mitm" -WindowStyle Hidden

      Start-Sleep -Seconds 5
      $certPath = "$9rConfigDir\certs\ca.crt"
      if (Test-Path $certPath) {
          Import-Certificate -FilePath $certPath -CertStoreLocation "Cert:\LocalMachine\Root" | Out-Null
          Log "  MITM CA certificate installed" Green
      }

      Log "[6/6] Kiểm tra mạng trước khi khởi động..." Cyan
      $netOk = $false
      for ($n = 1; $n -le 5; $n++) {
          try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:9090" -TimeoutSec 3 -ErrorAction Stop
              $netOk = $true; break
          } catch { if ($_.Exception.Message -match "404|200|301|302|remote") { $netOk = $true; break } }
          Start-Sleep -Seconds 3
      }
      if ($netOk) { Log "  MITM proxy responding" Green }
      else { Log "  MITM proxy not responding, IDE may fail" Yellow }

      Log "========================================" Green
      Log " INSTALL COMPLETE - READY TO LAUNCH " Green
      Log "========================================" Green

test_script:
  - ps: |
      $logFile = "$env:USERPROFILE\Desktop\phantom-node.log"
      function Log($msg, $color = "White") {
          $ts = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          $line = "[$ts] $msg"
          Write-Host $line -ForegroundColor $color
          Add-Content -Path $logFile -Value $line -ErrorAction SilentlyContinue
      }

      Log "========================================" Green
      Log " GOD MODE ACTIVE - CẢNH GIỚI BẤT TỬ " Green
      Log "========================================" Green

      # Chờ proxy ready
      $proxyReady = $false
      for ($pw = 1; $pw -le 30; $pw++) {
          try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:9090" -TimeoutSec 2 -ErrorAction Stop
              $proxyReady = $true; break
          } catch {
              if ($_.Exception.Message -match "404|200|301|302|remote|forcibly") { $proxyReady = $true; break }
          }
          Start-Sleep -Seconds 3
      }
      if (!$proxyReady) { Log "Proxy not ready after 90s!" Red }
      $signature = '[DllImport("psapi.dll")] public static extern int EmptyWorkingSet(IntPtr hwProc);'
      $psapi = Add-Type -MemberDefinition $signature -Name "PSAPI" -Namespace "Win32" -PassThru
      $wsh = New-Object -ComObject WScript.Shell

      # FIXED: RAM calculation (was dividing by 1024 twice)
      $maxMinutes = 60
      for ($i = 1; $i -le $maxMinutes; $i++) {
          $wsh.SendKeys('{F15}')

          # Boost priority
          foreach ($procName in @("ds2api", "node")) {
              Get-Process -Name $procName -ErrorAction SilentlyContinue | ForEach-Object {
                  $_.PriorityClass = [System.Diagnostics.ProcessPriorityClass]::High
              }
          }

          # Self-healing: ds2api
          if (!(Get-Process ds2api -ErrorAction SilentlyContinue)) {
              Log "[!] ds2api down - restarting..." Red
              Start-Process -FilePath $env:DS2API_PATH -WorkingDirectory $env:DS2API_DIR -WindowStyle Hidden
          }

          # Self-healing: 9router
          if (!(Get-Process node -ErrorAction SilentlyContinue)) {
              Log "[!] 9router down - restarting..." Red
              Start-Process -FilePath $env:ROUTER_PATH -ArgumentList "start", "--mitm" -WindowStyle Hidden
          }


          $psapi::EmptyWorkingSet([System.Diagnostics.Process]::GetCurrentProcess().Handle) | Out-Null

          # FIXED: RAM calculation
          $freeMemMB = [math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory / 1024, 1)
          $ds2apiOk = if (Get-Process ds2api -EA SilentlyContinue) { "OK" } else { "DOWN" }
          $routerOk = if (Get-Process node -EA SilentlyContinue) { "OK" } else { "DOWN" }
          Log "[$i/${maxMinutes}m] RAM: ${freeMemMB}MB | ds2api: $ds2apiOk | router: $routerOk" Cyan

          Start-Sleep -Seconds 60
      }

on_finish:
  - ps: |
      $logFile = "$env:USERPROFILE\Desktop\phantom-node.log"
      function Log($msg, $color = "White") {
          $ts = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          $line = "[$ts] $msg"
          Write-Host $line -ForegroundColor $color
          Add-Content -Path $logFile -Value $line -ErrorAction SilentlyContinue
      }

      Log "[*] Hết phiên. Kích hoạt quy trình tự hủy..." DarkRed

      # Graceful shutdown - kill process trees
      foreach ($procName in @("ds2api", "node")) {
          Get-Process -Name $procName -ErrorAction SilentlyContinue | ForEach-Object {
              Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
          }
      }

      # Cleanup traces
      Remove-Item "$env:USERPROFILE\.antigravity" -Recurse -Force -ErrorAction SilentlyContinue
      Remove-Item "$env:USERPROFILE\.9router" -Recurse -Force -ErrorAction SilentlyContinue
      Remove-Item "C:\ds2api.zip" -Force -ErrorAction SilentlyContinue
      Remove-Item "$env:TEMP\chrome_installer.exe" -Force -ErrorAction SilentlyContinue
      Remove-Item "$env:TEMP\session.zip" -Force -ErrorAction SilentlyContinue

      Log "[+] Không để lại dấu vết. Cáo lui!" Green
      Log "[+] Log saved to Desktop\phantom-node.log" Green
